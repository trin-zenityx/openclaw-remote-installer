<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Dashboard Login - OpenClaw Remote Installer</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Noto Sans Thai', sans-serif;
      background: #0f172a;
      color: #e2e8f0;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .container {
      max-width: 400px;
      width: 90%;
      background: #1e293b;
      border-radius: 16px;
      padding: 40px;
      box-shadow: 0 25px 50px rgba(0,0,0,0.3);
      text-align: center;
    }
    h1 {
      font-size: 24px;
      background: linear-gradient(135deg, #38bdf8, #818cf8);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      margin-bottom: 8px;
    }
    .subtitle {
      color: #94a3b8;
      font-size: 14px;
      margin-bottom: 32px;
    }
    .form-group {
      margin-bottom: 20px;
      text-align: left;
    }
    label {
      display: block;
      color: #94a3b8;
      font-size: 13px;
      margin-bottom: 6px;
    }
    input[type="password"] {
      width: 100%;
      padding: 12px 16px;
      background: #0f172a;
      border: 1px solid #334155;
      border-radius: 8px;
      color: #e2e8f0;
      font-size: 16px;
      outline: none;
      transition: border-color 0.2s;
    }
    input[type="password"]:focus {
      border-color: #38bdf8;
    }
    .login-btn {
      width: 100%;
      padding: 12px;
      background: #38bdf8;
      color: #0f172a;
      border: none;
      border-radius: 8px;
      font-size: 16px;
      font-weight: 600;
      cursor: pointer;
      transition: background 0.2s;
    }
    .login-btn:hover { background: #7dd3fc; }
    .login-btn:disabled { opacity: 0.5; cursor: not-allowed; }
    .error {
      color: #ef4444;
      font-size: 14px;
      margin-top: 12px;
      display: none;
    }
    .credits {
      margin-top: 28px;
      padding-top: 20px;
      border-top: 1px solid #334155;
    }
    .credits a {
      display: inline-flex;
      align-items: center;
      gap: 12px;
      text-decoration: none;
      color: #94a3b8;
      font-size: 12px;
      transition: all 0.2s;
      opacity: 0.7;
    }
    .credits a:hover { opacity: 1; }
    .credits .dev-by { font-size: 11px; color: #64748b; }
    .credits .logo-img {
      height: 28px;
      width: auto;
      transition: all 0.2s;
    }
    .credits a:hover .logo-img { filter: drop-shadow(0 0 6px rgba(56,189,248,0.5)); }
  </style>
</head>
<body>
  <div class="container">
    <h1>Dashboard</h1>
    <p class="subtitle">OpenClaw Remote Installer</p>

    <form onsubmit="handleLogin(event)">
      <div class="form-group">
        <label for="password">รหัสผ่านอาจารย์</label>
        <input type="password" id="password" placeholder="ใส่รหัสผ่าน..." autofocus>
      </div>
      <button type="submit" class="login-btn" id="login-btn">เข้าสู่ระบบ</button>
    </form>
    <p class="error" id="error-msg"></p>

    <div class="credits">
      <a href="https://github.com/trin-zenityx" target="_blank" rel="noopener">
        <span class="dev-by">Developed by</span>
        <img src="/logo-white.png" alt="ZenityX" class="logo-img">
      </a>
    </div>
  </div>

  <script>
    async function handleLogin(e) {
      e.preventDefault();
      const password = document.getElementById('password').value;
      const btn = document.getElementById('login-btn');
      const errorMsg = document.getElementById('error-msg');

      if (!password) return;

      btn.disabled = true;
      btn.textContent = 'กำลังเข้าสู่ระบบ...';
      errorMsg.style.display = 'none';

      try {
        const resp = await fetch('/api/login', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ password })
        });

        if (resp.ok) {
          window.location.href = '/dashboard';
        } else {
          const data = await resp.json();
          errorMsg.textContent = data.error || 'รหัสผ่านไม่ถูกต้อง';
          errorMsg.style.display = 'block';
        }
      } catch (err) {
        errorMsg.textContent = 'เกิดข้อผิดพลาด กรุณาลองใหม่';
        errorMsg.style.display = 'block';
      }

      btn.disabled = false;
      btn.textContent = 'เข้าสู่ระบบ';
    }
  </script>
</body>
</html>
