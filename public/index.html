<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>OpenClaw Remote Installer</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Noto Sans Thai', sans-serif;
      background: #0f172a;
      color: #e2e8f0;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .container {
      max-width: 500px;
      width: 90%;
      background: #1e293b;
      border-radius: 16px;
      padding: 40px;
      box-shadow: 0 25px 50px rgba(0,0,0,0.3);
      text-align: center;
    }
    h1 {
      font-size: 28px;
      background: linear-gradient(135deg, #38bdf8, #818cf8);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      margin-bottom: 16px;
    }
    p { color: #94a3b8; line-height: 1.8; margin-bottom: 12px; }
    .info-box {
      background: #0f172a;
      border: 1px solid #334155;
      border-radius: 8px;
      padding: 20px;
      margin: 24px 0;
    }
    .info-box h3 { color: #38bdf8; margin-bottom: 12px; font-size: 16px; }
    .info-box p { font-size: 14px; }
    .btn {
      display: inline-block;
      padding: 12px 32px;
      background: #38bdf8;
      color: #0f172a;
      text-decoration: none;
      border-radius: 8px;
      font-weight: 600;
      font-size: 16px;
      transition: all 0.2s;
      margin-top: 8px;
    }
    .btn:hover { background: #7dd3fc; }
    .credits {
      margin-top: 24px;
      padding-top: 20px;
      border-top: 1px solid #334155;
    }
    .credits a {
      display: inline-flex;
      align-items: center;
      gap: 12px;
      text-decoration: none;
      color: #94a3b8;
      font-size: 12px;
      opacity: 0.7;
      transition: all 0.2s;
    }
    .credits a:hover { opacity: 1; }
    .credits .dev-by { font-size: 11px; color: #64748b; }
    .credits .logo-img { height: 28px; width: auto; }
  </style>
</head>
<body>
  <div class="container">
    <h1>OpenClaw Remote Installer</h1>
    <p>ระบบช่วยติดตั้ง OpenClaw ผ่าน Remote</p>

    <div class="info-box">
      <h3>สำหรับนักเรียน</h3>
      <p>กรุณาใช้ URL ที่อาจารย์ส่งให้<br>(จะมีรูปแบบ .../r/xxxxxx)</p>
    </div>

    <div class="info-box">
      <h3>สำหรับอาจารย์</h3>
      <p>เข้าสู่ระบบเพื่อสร้างห้องเรียนและเริ่มติดตั้ง</p>
    </div>

    <a href="/login" class="btn">เข้าสู่ระบบ (อาจารย์)</a>

    <div class="credits">
      <a href="https://github.com/trin-zenityx" target="_blank" rel="noopener">
        <span class="dev-by">Developed by</span>
        <img src="/logo-white.png" alt="ZenityX" class="logo-img">
      </a>
    </div>
  </div>
</body>
</html>
